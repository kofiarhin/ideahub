name: Validate Ideas Hub

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile validator
        run: python -m py_compile scripts/validate_ideahub.py

      - name: Validate reconciliation and task identity
        run: python scripts/validate_ideahub.py
